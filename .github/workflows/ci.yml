name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, test, and coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew --no-daemon --stacktrace compileKotlin

      - name: Test
        run: ./gradlew --no-daemon --stacktrace test

      - name: Verify coverage threshold
        run: ./gradlew --no-daemon --stacktrace koverVerify

      - name: Coverage report (HTML + XML)
        if: ${{ always() }}
        run: ./gradlew --no-daemon koverHtmlReport koverXmlReport

      - name: Upload coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: kover-reports
          path: |
            build/reports/kover/html
            build/reports/kover/report.xml
          if-no-files-found: ignore

      - name: Upload test reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests
            **/build/test-results
          if-no-files-found: ignore
