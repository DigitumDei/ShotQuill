name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, test, and coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        run: |
          git init .
          git remote add origin "https://github.com/${GITHUB_REPOSITORY}.git"
          git fetch --no-tags --depth=1 origin "${GITHUB_SHA}"
          git checkout --force FETCH_HEAD

      - name: Set up JDK 17
        run: |
          echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME_17_X64}/bin" >> "$GITHUB_PATH"
          "${JAVA_HOME_17_X64}/bin/java" -version

      - name: Build
        run: ./gradlew --no-daemon --stacktrace build

      - name: Test
        run: ./gradlew --no-daemon --stacktrace test

      - name: Verify coverage threshold
        run: ./gradlew --no-daemon --stacktrace koverVerify

      - name: Coverage report (HTML + XML)
        if: ${{ always() }}
        run: ./gradlew --no-daemon koverHtmlReport koverXmlReport
