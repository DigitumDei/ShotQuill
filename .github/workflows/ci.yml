name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build, test, and coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        run: |
          echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> "$GITHUB_ENV"
          echo "${JAVA_HOME_17_X64}/bin" >> "$GITHUB_PATH"
          "${JAVA_HOME_17_X64}/bin/java" -version

      - name: Build
        run: ./gradlew --no-daemon --stacktrace build

      - name: Test
        run: ./gradlew --no-daemon --stacktrace test

      - name: Verify coverage threshold
        run: ./gradlew --no-daemon --stacktrace koverVerify

      - name: Coverage report (HTML + XML)
        if: ${{ always() }}
        run: ./gradlew --no-daemon koverHtmlReport koverXmlReport

      - name: Upload coverage reports
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: kover-reports
          path: |
            build/reports/kover/html
            build/reports/kover/report.xml
          if-no-files-found: ignore

      - name: Upload test reports on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/build/reports/tests
            **/build/test-results
          if-no-files-found: ignore
