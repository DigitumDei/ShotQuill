name: Jules Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  jules-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensures Jules can see the commit history/context

      - name: Run Jules Reviewer
        uses: google-labs-code/jules-action@v1
        with:
          api-key: ${{ secrets.JULES_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          task: "review-pr"
